version: '3.8'

services:
  # 1. The Database Container
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. Your Django Backend Container
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app  # Syncs your local files so you don't have to rebuild on every code change!
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

# Creates a permanent hard drive for Postgres so data survives reboots!
volumes:
  postgres_data: